name: Build and Push C++ Dev Container

on:
   push:
      branches: [main, develop]
      paths:
         - "Containerfile"
         - "toolchains/**"
         - ".github/workflows/build-push.yaml"
      tags:
         - "v*"
   pull_request:
      branches: [main]
      paths:
         - "Containerfile"
         - "toolchains/**"
         - ".github/workflows/build-push.yaml"
   workflow_dispatch:
      inputs:
         push_image:
            description: "Push image to registry"
            required: false
            default: true
            type: boolean

env:
   REGISTRY: docker.io
   IMAGE_NAME: ${{ secrets.DOCKER_USERNAME }}/devcon-cpp
   BUILD_JOBS: 4

concurrency:
   group: ${{ github.workflow }}-${{ github.ref }}
   cancel-in-progress: true

jobs:
   # Job 0: Lightweight PR check — Trivy misconfiguration scan only
   pr-check:
      runs-on: ubuntu-latest
      if: github.event_name == 'pull_request'
      permissions:
         contents: read
         security-events: write

      steps:
         - name: Checkout repository
           uses: actions/checkout@v4

         - name: Scan Containerfile for misconfigurations
           uses: aquasecurity/trivy-action@c1824fd6edce30d7ab345a9989de00bbd46ef284 # v0.34.0
           with:
              scan-type: "config"
              scan-ref: "."
              format: "sarif"
              output: "trivy-results.sarif"
              severity: "CRITICAL,HIGH"
              ignore-unfixed: true

         - name: Upload Trivy results to GitHub Security
           if: always()
           uses: github/codeql-action/upload-sarif@v4
           with:
              sarif_file: "trivy-results.sarif"
              category: "dockerfile-config"

   # Job 1a: Build amd64 images natively and push by digest
   build-amd64:
      runs-on: ubuntu-24.04
      if: github.event_name != 'pull_request'
      timeout-minutes: 60
      permissions:
         contents: read
         packages: write
         id-token: write

      strategy:
         matrix:
            target: [runtime, runtime-slim, development, development-slim]

      steps:
         - name: Checkout repository
           uses: actions/checkout@v4

         - name: Set up Docker Buildx
           uses: docker/setup-buildx-action@v3
           with:
              driver-opts: |
                 image=moby/buildkit:v0.27.1
                 network=host

         - name: Log in to Docker Hub
           uses: docker/login-action@v3
           with:
              registry: ${{ env.REGISTRY }}
              username: ${{ secrets.DOCKER_USERNAME }}
              password: ${{ secrets.DOCKER_PASSWORD }}

         - name: Build and push by digest (amd64)
           id: build
           uses: docker/build-push-action@v6.18.0
           with:
              context: .
              file: ./Containerfile
              platforms: linux/amd64
              target: ${{ matrix.target }}
              provenance: true
              sbom: true
              outputs: type=image,name=${{ env.REGISTRY }}/${{ env.IMAGE_NAME }},push-by-digest=true,name-canonical=true,push=true
              cache-from: type=registry,ref=${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}:buildcache-${{ matrix.target }}-amd64
              cache-to: type=registry,ref=${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}:buildcache-${{ matrix.target }}-amd64,mode=max
              build-args: |
                 BUILD_JOBS=${{ env.BUILD_JOBS }}
                 BUILDKIT_INLINE_CACHE=1

         - name: Export digest
           run: |
              mkdir -p /tmp/digests
              digest="${{ steps.build.outputs.digest }}"
              touch "/tmp/digests/${digest#sha256:}"

         - name: Upload digest artifact
           uses: actions/upload-artifact@v4
           with:
              name: digest-${{ matrix.target }}-amd64
              path: /tmp/digests/*
              if-no-files-found: error
              retention-days: 1

   # Job 1b: Build arm64 images natively and push by digest
   build-arm64:
      runs-on: ubuntu-24.04-arm
      if: github.event_name != 'pull_request'
      timeout-minutes: 60
      permissions:
         contents: read
         packages: write
         id-token: write

      strategy:
         matrix:
            target: [runtime, runtime-slim, development, development-slim]

      steps:
         - name: Checkout repository
           uses: actions/checkout@v4

         - name: Set up Docker Buildx
           uses: docker/setup-buildx-action@v3
           with:
              driver-opts: |
                 image=moby/buildkit:v0.27.1
                 network=host

         - name: Log in to Docker Hub
           uses: docker/login-action@v3
           with:
              registry: ${{ env.REGISTRY }}
              username: ${{ secrets.DOCKER_USERNAME }}
              password: ${{ secrets.DOCKER_PASSWORD }}

         - name: Build and push by digest (arm64)
           id: build
           uses: docker/build-push-action@v6.18.0
           with:
              context: .
              file: ./Containerfile
              platforms: linux/arm64
              target: ${{ matrix.target }}
              provenance: true
              sbom: true
              outputs: type=image,name=${{ env.REGISTRY }}/${{ env.IMAGE_NAME }},push-by-digest=true,name-canonical=true,push=true
              cache-from: type=registry,ref=${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}:buildcache-${{ matrix.target }}-arm64
              cache-to: type=registry,ref=${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}:buildcache-${{ matrix.target }}-arm64,mode=max
              build-args: |
                 BUILD_JOBS=${{ env.BUILD_JOBS }}
                 BUILDKIT_INLINE_CACHE=1

         - name: Export digest
           run: |
              mkdir -p /tmp/digests
              digest="${{ steps.build.outputs.digest }}"
              touch "/tmp/digests/${digest#sha256:}"

         - name: Upload digest artifact
           uses: actions/upload-artifact@v4
           with:
              name: digest-${{ matrix.target }}-arm64
              path: /tmp/digests/*
              if-no-files-found: error
              retention-days: 1

   # Job 2: Merge per-arch digests into multi-arch manifests, sign, test, scan
   merge:
      runs-on: ubuntu-24.04
      if: github.event_name != 'pull_request'
      needs: [build-amd64, build-arm64]
      timeout-minutes: 20
      permissions:
         contents: write
         packages: write
         security-events: write
         id-token: write

      strategy:
         fail-fast: false
         matrix:
            target: [runtime, runtime-slim, development, development-slim]

      steps:
         - name: Checkout repository
           uses: actions/checkout@v4

         - name: Install Cosign
           uses: sigstore/cosign-installer@v4.0.0

         - name: Set up Docker Buildx
           uses: docker/setup-buildx-action@v3

         - name: Log in to Docker Hub
           uses: docker/login-action@v3
           with:
              registry: ${{ env.REGISTRY }}
              username: ${{ secrets.DOCKER_USERNAME }}
              password: ${{ secrets.DOCKER_PASSWORD }}

         - name: Download amd64 digest
           uses: actions/download-artifact@v4
           with:
              name: digest-${{ matrix.target }}-amd64
              path: /tmp/digests

         - name: Download arm64 digest
           uses: actions/download-artifact@v4
           with:
              name: digest-${{ matrix.target }}-arm64
              path: /tmp/digests

         - name: Extract metadata
           id: meta
           uses: docker/metadata-action@v5
           with:
              images: ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}
              tags: |
                 type=ref,event=branch,suffix=-${{ matrix.target }}
                 type=ref,event=pr,suffix=-${{ matrix.target }}
                 type=semver,pattern={{version}},suffix=-${{ matrix.target }}
                 type=semver,pattern={{major}}.{{minor}},suffix=-${{ matrix.target }}
                 type=sha,suffix=-${{ matrix.target }}
                 type=raw,value=latest-${{ matrix.target }},enable={{is_default_branch}}
              flavor: |
                 latest=false

         - name: Create multi-arch manifest
           working-directory: /tmp/digests
           run: |
              docker buildx imagetools create \
                $(jq -cr '.tags | map("-t " + .) | join(" ")' <<< "$DOCKER_METADATA_OUTPUT_JSON") \
                $(printf '${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}@sha256:%s ' *)

         - name: Get manifest digest
           id: manifest-digest
           run: |
              IMAGE_TAG=$(jq -r '.tags[0]' <<< "$DOCKER_METADATA_OUTPUT_JSON")
              DIGEST=$(docker buildx imagetools inspect "${IMAGE_TAG}" \
                --format '{{json .}}' | jq -r '.manifest.digest')
              echo "digest=${DIGEST}" >> $GITHUB_OUTPUT
              echo "image_tag=${IMAGE_TAG}" >> $GITHUB_OUTPUT

         - name: Sign Docker image with Cosign
           if: github.event.inputs.push_image != 'false' && steps.manifest-digest.outputs.digest != ''
           env:
              DIGEST: ${{ steps.manifest-digest.outputs.digest }}
              TAGS: ${{ steps.meta.outputs.tags }}
           run: |
              images=""
              for tag in ${TAGS}; do
                 images+="${tag}@${DIGEST} "
              done
              cosign sign --yes ${images}

         - name: Test image
           if: matrix.target == 'runtime'
           run: |
              docker run --rm ${{ steps.manifest-digest.outputs.image_tag }} bash -c "
                set -e
                echo '=== Testing compilers ==='
                g++ --version
                arm-linux-gnueabihf-g++ --version
                aarch64-linux-gnu-g++ --version

                echo '=== Testing build tools ==='
                cmake --version
                ninja --version

                echo '=== Testing libraries ==='
                pkg-config --exists grpc++ && echo 'gRPC: OK' || echo 'gRPC: MISSING'
                pkg-config --exists gtest && echo 'GTest: OK' || echo 'GTest: MISSING'

                echo '=== Testing code quality tools ==='
                clang-format --version
                clang-tidy --version

                echo '=== All tests passed ==='
              "

         - name: Scan image for vulnerabilities
           uses: aquasecurity/trivy-action@c1824fd6edce30d7ab345a9989de00bbd46ef284 # v0.34.0
           with:
              image-ref: ${{ steps.manifest-digest.outputs.image_tag }}
              format: "sarif"
              ignore-unfixed: true
              output: "trivy-results.sarif"
              severity: "CRITICAL,HIGH"
              limit-severities-for-sarif: true

         - name: Upload Trivy results to GitHub Security
           if: >-
              always() &&
              (matrix.target == 'runtime' || matrix.target == 'development')
           uses: github/codeql-action/upload-sarif@v4
           with:
              sarif_file: "trivy-results.sarif"
              category: ${{ matrix.target }}

   # Job 3: Generate SBOM (Software Bill of Materials)
   # Uses Syft (via anchore/sbom-action) as the authoritative SBOM generator —
   # it provides superior package detection accuracy over Trivy's secondary SBOM
   # feature. Trivy remains dedicated to vulnerability scanning (Job 2).
   # Generates both SPDX-JSON (NIST/EO-14028) and CycloneDX-JSON (OWASP/SLSA).
   sbom:
      runs-on: ubuntu-latest
      needs: merge
      if: github.event_name != 'pull_request'
      strategy:
         matrix:
            target: [runtime, runtime-slim, development, development-slim]
            format: [spdx-json, cyclonedx-json]

      permissions:
         contents: write
         id-token: write

      steps:
         - name: Log in to Docker Hub
           uses: docker/login-action@v3
           with:
              registry: ${{ env.REGISTRY }}
              username: ${{ secrets.DOCKER_USERNAME }}
              password: ${{ secrets.DOCKER_PASSWORD }}

         - name: Extract metadata
           id: meta
           uses: docker/metadata-action@v5
           with:
              images: ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}
              tags: |
                 type=ref,event=branch,suffix=-${{ matrix.target }}
                 type=semver,pattern={{version}},suffix=-${{ matrix.target }}
                 type=semver,pattern={{major}}.{{minor}},suffix=-${{ matrix.target }}
                 type=sha,suffix=-${{ matrix.target }}
                 type=raw,value=latest-${{ matrix.target }},enable={{is_default_branch}}
              flavor: |
                 latest=false

         - name: Resolve image tag
           id: image-ref
           run: |
              echo "tag=$(jq -r '.tags[0]' <<< "$DOCKER_METADATA_OUTPUT_JSON")" >> $GITHUB_OUTPUT

         - name: Generate SBOM (${{ matrix.target }} / ${{ matrix.format }})
           uses: anchore/sbom-action@v0
           with:
              image: ${{ steps.image-ref.outputs.tag }}
              format: ${{ matrix.format }}
              output-file: sbom-${{ matrix.target }}.${{ matrix.format == 'spdx-json' && 'spdx.json' || 'cdx.json' }}
              dependency-snapshot: true

         - name: Upload SBOM
           uses: actions/upload-artifact@v4
           with:
              name: sbom-${{ matrix.target }}-${{ matrix.format }}
              path: sbom-${{ matrix.target }}.*

         - name: Install Cosign
           uses: sigstore/cosign-installer@v4.0.0

         - name: Get image digest
           id: image-digest
           run: |
              DIGEST=$(docker buildx imagetools inspect \
                "${{ steps.image-ref.outputs.tag }}" \
                --format '{{json .}}' | jq -r '.manifest.digest')
              echo "digest=${DIGEST}" >> $GITHUB_OUTPUT

         - name: Attest SBOM with Cosign
           run: |
              if [ "${{ matrix.format }}" = "spdx-json" ]; then
                PRED_TYPE="spdxjson"
                SBOM_FILE="sbom-${{ matrix.target }}.spdx.json"
              else
                PRED_TYPE="cyclonedx"
                SBOM_FILE="sbom-${{ matrix.target }}.cdx.json"
              fi
              IMAGE="${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}@${{ steps.image-digest.outputs.digest }}"
              cosign attest --yes \
                --type ${PRED_TYPE} \
                --predicate ${SBOM_FILE} \
                ${IMAGE}

   # Job 4: Update image documentation
   update-readme:
      runs-on: ubuntu-latest
      needs: merge
      if: github.ref == 'refs/heads/main' && github.event_name == 'push'

      steps:
         - name: Checkout repository
           uses: actions/checkout@v4

         - name: Docker Hub Description
           uses: peter-evans/dockerhub-description@v4
           with:
              username: ${{ secrets.DOCKER_USERNAME }}
              password: ${{ secrets.DOCKER_PASSWORD }}
              repository: ${{ env.IMAGE_NAME }}
              readme-filepath: ./README.md
           continue-on-error: true
